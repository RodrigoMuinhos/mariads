spring:
  application:
    name: tattoo-backend
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tattoo}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        "[format_sql]": true
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 15MB

server:
  port: ${SERVER_PORT:8080}

app:
  public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:${server.port}}
  cors-origin: ${APP_CORS_ORIGIN:http://localhost:5173}

logging:
  level:
    "[org.hibernate.SQL]": warn