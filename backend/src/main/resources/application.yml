spring:
  application:
    name: tattoo-backend
  config:
    import: optional:file:.env[.properties]
  datasource:
    # SPRING_DATASOURCE_* continua sendo a configuracao preferencial. Os
    # fallbacks PG* permitem conectar diretamente a um PostgreSQL do Railway.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:tattoo}${PGSSLMODE_QUERY:}}
    username: ${SPRING_DATASOURCE_USERNAME:${PGUSER:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        "[format_sql]": true
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 15MB

server:
  port: ${PORT:${SERVER_PORT:8080}}

app:
  public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:${server.port}}
  cors-origin: ${APP_CORS_ORIGIN:http://localhost:5173}

logging:
  level:
    "[org.hibernate.SQL]": warn
